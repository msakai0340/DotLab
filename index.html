<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>点字学習アプリ</title>

<style>
body{
    margin:0;
    padding:20px;
    background:#f3f3f3;
    font-family:sans-serif;
}

.container{
    max-width:1000px;
    margin:auto;
}

.card{
    background:white;
    padding:45px;
    margin-bottom:40px;
    border-radius:20px;
    box-shadow:0 4px 15px rgba(0,0,0,0.1);
}

h1{
    text-align:center;
    font-size:72px;
    margin-bottom:50px;
}

h2{
    text-align:center;
    font-size:54px;
    margin-bottom:30px;
}

.description{
    text-align:center;
    color:#666;
    font-size:34px;
    margin-bottom:30px;
}

input{
    width:100%;
    padding:28px;
    font-size:42px;
    border:2px solid #ccc;
    border-radius:12px;
    box-sizing:border-box;
    margin-bottom:30px;
}

button{
    display:block;
    margin:0 auto;
    padding:24px 60px;
    font-size:42px;
    background:#222;
    color:white;
    border:none;
    border-radius:14px;
    cursor:pointer;
}

button:hover{
    background:#444;
}

.result{
    margin-top:35px;
    background:#eee;
    padding:45px;
    border-radius:18px;
    text-align:center;
    font-size:72px;
    font-weight:bold;
    word-break:break-all;
    line-height:1.7;
}

.small-result{
    font-size:52px;
    line-height:1.8;
}

.real-braille{
    font-size:90px;
    letter-spacing:12px;
}

@media(max-width:700px){
    body{
        padding:10px;
    }

    .card{
        padding:25px;
    }

    h1{
        font-size:42px;
    }

    h2{
        font-size:34px;
    }

    .description{
        font-size:22px;
    }

    input{
        font-size:28px;
        padding:18px;
    }

    button{
        width:100%;
        font-size:28px;
        padding:18px;
    }

    .result{
        font-size:42px;
        padding:30px;
    }

    .small-result{
        font-size:34px;
    }

    .real-braille{
        font-size:58px;
        letter-spacing:6px;
    }
}
</style>
</head>

<body>

<div class="container">

<h1>点字学習アプリ</h1>

<div class="card">
    <h2>① 点字数字 → ひらがな</h2>

    <div class="description">
        例：24 136 345 3 2 6
    </div>

    <input id="brailleNumberInput" type="text" placeholder="点字数字をスペース区切りで入力">

    <button onclick="brailleNumberToHiragana()">ひらがなに変換</button>

    <div class="result" id="brailleNumberResult">-</div>
</div>

<div class="card">
    <h2>② ひらがな → 点字数字</h2>

    <div class="description">
        例：おはよう！ 
    </div>

    <input id="hiraganaInput" type="text" placeholder="ひらがなを入力">

    <button onclick="hiraganaToBrailleNumber()">点字数字に変換</button>

    <div class="result small-result" id="brailleNumberResult2">-</div>
</div>

<div class="card">
    <h2>③ ひらがな → 点字</h2>

    <div class="description">
        例：おはよう！
    </div>

    <input id="hiraganaBrailleInput" type="text" placeholder="ひらがなを入力">

    <button onclick="hiraganaToRealBraille()">点字に変換</button>

    <div class="result real-braille" id="realBrailleResult">-</div>
</div>

</div>

<script>
const brailleNumberMap = {

    /* あ行 */
    "あ":"1", "い":"12", "う":"14", "え":"124", "お":"24",

    /* か行 */
    "か":"16", "き":"126", "く":"146", "け":"1246", "こ":"246",

    /* さ行 */
    "さ":"156", "し":"1256", "す":"1456", "せ":"12456", "そ":"2456",

    /* た行 */
    "た":"135", "ち":"1235", "つ":"1345", "て":"12345", "と":"2345",

    /* な行 */
    "な":"13", "に":"123", "ぬ":"134", "ね":"1234", "の":"234",

    /* は行 */
    "は":"136", "ひ":"1236", "ふ":"1346", "へ":"12346", "ほ":"2346",

    /* ま行 */
    "ま":"1356", "み":"12356", "む":"13456", "め":"123456", "も":"23456",

    /* や行 */
    "や":"34", "ゆ":"346", "よ":"345",

    /* ら行 */
    "ら":"15", "り":"125", "る":"145", "れ":"1245", "ろ":"246",

    /* わ行 */
    "わ":"3", "を":"35", "ん":"356",

    /* 濁音 */
    "が":"5 16", "ぎ":"5 126", "ぐ":"5 146", "げ":"5 1246", "ご":"5 246",
    "ざ":"5 156", "じ":"5 1256", "ず":"5 1456", "ぜ":"5 12456", "ぞ":"5 2456",
    "だ":"5 135", "ぢ":"5 1235", "づ":"5 1345", "で":"5 12345", "ど":"5 2345",
    "ば":"5 136", "び":"5 1236", "ぶ":"5 1346", "べ":"5 12346", "ぼ":"5 2346",

    /* 半濁音 */
    "ぱ":"6 136", "ぴ":"6 1236", "ぷ":"6 1346", "ぺ":"6 12346", "ぽ":"6 2346",

    /* 拗音 */
    "きゃ":"4 16", "きゅ":"4 146", "きょ":"4 246",
    "しゃ":"4 156", "しゅ":"4 1456", "しょ":"4 2456",
    "ちゃ":"4 135", "ちゅ":"4 1345", "ちょ":"4 2345",
    "にゃ":"4 13", "にゅ":"4 134", "にょ":"4 234",
    "ひゃ":"4 136", "ひゅ":"4 1346", "ひょ":"4 2346",
    "みゃ":"4 1356", "みゅ":"4 13456", "みょ":"4 23456",
    "りゃ":"4 15", "りゅ":"4 146", "りょ":"4 245",

    /* 濁拗音 */
    "ぎゃ":"45 16", "ぎゅ":"45 146", "ぎょ":"45 246",
    "じゃ":"45 156", "じゅ":"45 1456", "じょ":"45 2456",
    "びゃ":"45 136", "びゅ":"45 1346", "びょ":"45 2346",
    "ぴゃ":"46 136", "ぴゅ":"46 1346", "ぴょ":"46 2346",

    /* 句読点・記号 */
    "、":"56",
    "。":"256",
    "？":"26",
    "！":"235",
    "・":"5"
};

const realBrailleMap = {

    "あ":"⠁", "い":"⠃", "う":"⠉", "え":"⠋", "お":"⠊",

    "か":"⠡", "き":"⠣", "く":"⠩", "け":"⠫", "こ":"⠪",

    "さ":"⠱", "し":"⠳", "す":"⠹", "せ":"⠻", "そ":"⠺",

    "た":"⠑", "ち":"⠓", "つ":"⠙", "て":"⠛", "と":"⠚",

    "な":"⠕", "に":"⠗", "ぬ":"⠝", "ね":"⠟", "の":"⠞",

    "は":"⠥", "ひ":"⠧", "ふ":"⠭", "へ":"⠯", "ほ":"⠮",

    "ま":"⠵", "み":"⠷", "む":"⠽", "め":"⠿", "も":"⠾",

    "や":"⠌", "ゆ":"⠬", "よ":"⠜",

    "ら":"⠇", "り":"⠏", "る":"⠟", "れ":"⠿", "ろ":"⠎",

    "わ":"⠴", "を":"⠶", "ん":"⠴",

    /* 濁音 */
    "が":"⠐⠡", "ぎ":"⠐⠣", "ぐ":"⠐⠩", "げ":"⠐⠫", "ご":"⠐⠪",
    "ざ":"⠐⠱", "じ":"⠐⠳", "ず":"⠐⠹", "ぜ":"⠐⠻", "ぞ":"⠐⠺",
    "だ":"⠐⠑", "ぢ":"⠐⠓", "づ":"⠐⠙", "で":"⠐⠛", "ど":"⠐⠚",
    "ば":"⠐⠥", "び":"⠐⠧", "ぶ":"⠐⠭", "べ":"⠐⠯", "ぼ":"⠐⠮",

    /* 半濁音 */
    "ぱ":"⠠⠥", "ぴ":"⠠⠧", "ぷ":"⠠⠭", "ぺ":"⠠⠯", "ぽ":"⠠⠮",

    /* 拗音 */
    "きゃ":"⠈⠡", "きゅ":"⠈⠩", "きょ":"⠈⠪",
    "しゃ":"⠈⠱", "しゅ":"⠈⠹", "しょ":"⠈⠺",
    "ちゃ":"⠈⠑", "ちゅ":"⠈⠙", "ちょ":"⠈⠚",
    "にゃ":"⠈⠕", "にゅ":"⠈⠝", "にょ":"⠈⠞",
    "ひゃ":"⠈⠥", "ひゅ":"⠈⠭", "ひょ":"⠈⠮",
    "みゃ":"⠈⠵", "みゅ":"⠈⠽", "みょ":"⠈⠾",
    "りゃ":"⠈⠇", "りゅ":"⠈⠟", "りょ":"⠈⠎",

    /* 濁拗音 */
    "ぎゃ":"⠘⠡", "ぎゅ":"⠘⠩", "ぎょ":"⠘⠪",
    "じゃ":"⠘⠱", "じゅ":"⠘⠹", "じょ":"⠘⠺",
    "びゃ":"⠘⠥", "びゅ":"⠘⠭", "びょ":"⠘⠮",
    "ぴゃ":"⠨⠥", "ぴゅ":"⠨⠭", "ぴょ":"⠨⠮",

    /* 記号 */
    "、":"⠂",
    "。":"⠲",
    "？":"⠦",
    "！":"⠖",
    "・":"⠐"
};

const brailleToHiraganaMap = {};

for(const key in brailleNumberMap){
    brailleToHiraganaMap[brailleNumberMap[key]] = key;
}

function convertHiragana(input, map){

    let result = [];
    let i = 0;

    while(i < input.length){

        const twoChars = input.substring(i, i + 2);

        if(map[twoChars]){
            result.push(map[twoChars]);
            i += 2;
        }else{

            const oneChar = input[i];

            if(map[oneChar]){
                result.push(map[oneChar]);
            }else{
                result.push("?");
            }

            i++;
        }
    }

    return result;
}

function brailleNumberToHiragana(){

    const input = document.getElementById("brailleNumberInput").value.trim();

    if(input === ""){
        document.getElementById("brailleNumberResult").innerText = "入力してください";
        return;
    }

    const nums = input.split(/\s+/);

    let result = [];
    let i = 0;

    while(i < nums.length){

        const two =
            nums[i] + " " + nums[i + 1];

        if(brailleToHiraganaMap[two]){
            result.push(brailleToHiraganaMap[two]);
            i += 2;
        }
        else if(brailleToHiraganaMap[nums[i]]){
            result.push(brailleToHiraganaMap[nums[i]]);
            i++;
        }
        else{
            result.push("?");
            i++;
        }
    }

    document.getElementById("brailleNumberResult").innerText = result.join("");
}

function hiraganaToBrailleNumber(){

    const input = document.getElementById("hiraganaInput").value.trim();

    if(input === ""){
        document.getElementById("brailleNumberResult2").innerText = "入力してください";
        return;
    }

    const result = convertHiragana(input, brailleNumberMap);

    document.getElementById("brailleNumberResult2").innerText =
        result.join(" / ");
}

function hiraganaToRealBraille(){

    const input = document.getElementById("hiraganaBrailleInput").value.trim();

    if(input === ""){
        document.getElementById("realBrailleResult").innerText = "入力してください";
        return;
    }

    const result = convertHiragana(input, realBrailleMap);

    document.getElementById("realBrailleResult").innerText =
        result.join("");
}
</script>

</body>
</html>
