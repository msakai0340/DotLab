<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>点字学習アプリ</title>

<link rel="stylesheet" href="style.css">

<style>
body{
    margin:0;
    padding:20px;
    background:#f3f3f3;
    font-family:sans-serif;
}

.container{
    max-width:1000px;
    margin:auto;
}

.card{
    background:white;
    padding:45px;
    margin-bottom:40px;
    border-radius:20px;
    box-shadow:0 4px 15px rgba(0,0,0,0.1);
}

h1{
    text-align:center;
    font-size:72px;
    margin-bottom:50px;
}

h2{
    text-align:center;
    font-size:54px;
    margin-bottom:30px;
}

.description{
    text-align:center;
    color:#666;
    font-size:34px;
    margin-bottom:30px;
}

input{
    width:100%;
    padding:28px;
    font-size:42px;
    border:2px solid #ccc;
    border-radius:12px;
    box-sizing:border-box;
    margin-bottom:30px;
}

button{
    display:block;
    margin:0 auto;
    padding:24px 60px;
    font-size:42px;
    background:#222;
    color:white;
    border:none;
    border-radius:14px;
    cursor:pointer;
}

button:hover{
    background:#444;
}

.result{
    margin-top:35px;
    background:#eee;
    padding:45px;
    border-radius:18px;
    text-align:center;
    font-size:72px;
    font-weight:bold;
    word-break:break-all;
    line-height:1.7;
}

.small-result{
    font-size:52px;
    line-height:1.8;
}

.real-braille{
    font-size:90px;
    letter-spacing:12px;
}

@media(max-width:700px){

    body{
        padding:10px;
    }

    .card{
        padding:25px;
    }

    h1{
        font-size:42px;
    }

    h2{
        font-size:34px;
    }

    .description{
        font-size:22px;
    }

    input{
        font-size:28px;
        padding:18px;
    }

    button{
        width:100%;
        font-size:28px;
        padding:18px;
    }

    .result{
        font-size:42px;
        padding:30px;
    }

    .small-result{
        font-size:34px;
    }

    .real-braille{
        font-size:58px;
        letter-spacing:6px;
    }
}
</style>
</head>

<body>

<div class="container">

<h1>点字学習アプリ</h1>

<div class="card">
    <h2>① 点字数字 → ひらがな</h2>

    <div class="description">
        例：24 136 345 3 2 6
    </div>

    <input id="brailleNumberInput" type="text" placeholder="点字数字をスペース区切りで入力">

    <button onclick="brailleNumberToHiragana()">ひらがなに変換</button>

    <div class="result" id="brailleNumberResult">-</div>
</div>

<div class="card">
    <h2>② ひらがな → 点字数字</h2>

    <div class="description">
        例：おはよう！
    </div>

    <input id="hiraganaInput" type="text" placeholder="ひらがなを入力">

    <button onclick="hiraganaToBrailleNumber()">点字数字に変換</button>

    <div class="result small-result" id="brailleNumberResult2">-</div>
</div>

<div class="card">
    <h2>③ ひらがな → 点字</h2>

    <div class="description">
        例：おはよう！
    </div>

    <input id="hiraganaBrailleInput" type="text" placeholder="ひらがなを入力">

    <button onclick="hiraganaToRealBraille()">点字に変換</button>

    <div class="result real-braille" id="realBrailleResult">-</div>
</div>

</div>

<script src="script.js"></script>

</body>
</html>
