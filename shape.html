<title>点字の形を見てみる</title>

<body>

<div class="container">

    <div class="card">

        <h1>点字の形を見てみる</h1>

        <div class="description">
            ひらがなを入力すると、<br>
            実際の点字の形で表示できます。
        </div>

        <div class="description">
            例：おはよう！
        </div>

        <input
            id="hiraganaBrailleInput"
            type="text"
            placeholder="例：おはよう！"
        >

        <button
            class="touch-button"
            onclick="hiraganaToRealBraille()"
        >
            点字を表示する
        </button>

        <div
            class="result real-braille"
            id="realBrailleResult"
        >
            -
        </div>

    </div>

    <div class="menu-card">
        <div class="menu-card-title">
            このページでできること
        </div>

        <div class="menu-card-text">
            入力したひらがなを、実際の点字の形で表示します。<br>
            点字の形を目で見て、数字の場所とつなげて覚えやすくします。
        </div>
    </div>

    <div class="menu-card">
        <div class="menu-card-title">
            ほかのページへ
        </div>

            <a href="number.html">② 点の数字を見てみる</a>
        </div>
    </div>

</div>
