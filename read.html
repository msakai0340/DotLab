<div class="container">

    <div class="card">

        <h1>点字を読んでみる</h1>

        <div class="description">
            点字の数字を入力すると、<br>
            ひらがなに変換できます。
        </div>

        <div class="description">
            例：24 136 345
        </div>

        <input
            id="brailleNumberInput"
            type="text"
            placeholder="例：24 136 345"
        >

        <button
            class="touch-button"
            onclick="brailleNumberToHiragana()"
        >
            読んでみる
        </button>

        <div
            class="result"
            id="brailleNumberResult"
        >
            -
        </div>

    </div>

    <div class="menu-card">
        <div class="menu-card-title">
            入力のしかた
        </div>

        <div class="menu-card-text">
            点字1文字ぶんの数字を、スペースで区切って入力します。<br>
            例：お は よ → 24 136 345
        </div>
    </div>
