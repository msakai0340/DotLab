<!DOCTYPE html>
<html lang="ja">

<meta charset="UTF-8">

<title>点の数字を見てみる</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

    <div class="card">

        <h1>点の数字を見てみる</h1>

        <div class="description">
            ひらがなを入力すると、<br>
            点字の数字に変換できます。
        </div>

        <div class="description">
            例：おはよう！
        </div>

        <input
            id="hiraganaInput"
            type="text"
            placeholder="例：おはよう！"
        >

        <button
            class="touch-button"
            onclick="hiraganaToBrailleNumber()"
        >
            点の数字を見る
        </button>

        <div
            class="result small-result"
            id="brailleNumberResult2"
        >
            -
        </div>

    </div>

    <div class="menu-card">
        <div class="menu-card-title">
            このページでできること
        </div>

        <div class="menu-card-text">
            ひらがなを入力すると、点字の6つの点の場所を数字で表示します。<br>
            例：お → 24、は → 136、よ → 345
        </div>
    </div>

    <div class="menu-card">
        <div class="menu-card-title">
            ほかのページへ
        </div>

        <div class="menu-card-text">
            <a href="top-test.html">トップへ戻る</a><br>
            <a href="read.html">① 点字を読んでみる</a><br>
            <a href="shape.html">③ 点字の形を見てみる</a>
        </div>
    </div>

</div>
